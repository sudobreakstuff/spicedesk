name: spicedesk
description: "Business management suite for savories shops. Built by Shahid Singh."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.8.0
  provider: ^6.1.0
  sqflite: ^2.4.0
  path: ^1.9.0
  path_provider: ^2.1.0
  niimbot_print: ^0.0.6
  url_launcher: ^6.3.0
  pdf: ^3.11.0
  printing: ^5.13.0
  share_plus: ^10.0.0
  intl: ^0.19.0
  uuid: ^4.5.0
  image_picker: ^1.1.0
  connectivity_plus: ^6.1.0
  google_fonts: ^6.2.0
  google_sign_in: ^6.2.0
  flutter_secure_storage: ^9.2.0
  local_auth: ^2.3.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
