name: spicedesk
description: "SpiceDesk — Business Suite with POS, inventory, CRM, and expenses. Dedicated to Mum and Dad."
publish_to: 'none'
version: 2.5.4+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  # UI — Liquid Glass aesthetic (custom implementation)
  flutter_animate: ^4.5.2
  flutter_svg: ^2.0.16
  shimmer: ^3.0.0
  animations: ^2.0.11

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Backend — Supabase
  supabase_flutter: ^2.8.2

  # Navigation
  go_router: ^14.6.2

  # Charts
  fl_chart: ^0.69.2

  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.3.4
  path_provider: ^2.1.5
  image_picker: ^1.1.2
  mobile_scanner: ^6.0.3
  uuid: ^4.5.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.8.1
  url_launcher: ^6.3.1

  # PDF generation & printing
  pdf: ^3.11.1
  printing: ^5.14.2


  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.7.1
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  # App icon uses default Flutter icon with SpiceDesk brand colors.
  # Gradient icon displayed on login screen.
  assets:
    - assets/images/
    - assets/icons/
